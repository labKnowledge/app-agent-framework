name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: app-agent

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app-agent/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Validate
        run: pnpm validate

      - name: Coverage
        run: pnpm test:coverage
